version: '3.8'

services:
  db:
    image: postgres:15
    restart: unless-stopped
    env_file: .env.postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB} -h localhost || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    name: matiapu_pgdata
